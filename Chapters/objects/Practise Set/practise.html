<!DOCTYPE html>
<html lang="en">

    <title> Practise Set</title>

<body>
    <script>
        let product = {
            name: 'jeans',
            size: 'S',
            fit: 'Slim fit',
            'delivery-time': 'Same day delivery',
        };

        function isIdenticalProduct(product1, product2){
            if(typeof product1 !== 'object' || typeof product2 !== 'object'){
                console.warn('parameter passes was not an object');
                return false;
            }

            if(product1 == product2){
                return true;
            }

            if(product1.name === product2.name && product1.size === product2.size && 
                product1.fit === product2.fit){
                    return true;
                }
                else{
                    return false;
                }
            

        }
    </script>
</body>

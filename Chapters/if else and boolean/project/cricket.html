<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Ball Bat Stump Game</h1>
    
        <button onclick="
        let randomNumber = Math.random() * 3;
        let computerChoice;
        let resultMsg;

        if (randomNumber > 0 && randomNumber <= 1) {
            computerChoice = 'Bat';
        } else if (randomNumber > 1 && randomNumber <= 2) {
            computerChoice = 'Ball';
        } else {
            computerChoice = 'Stump';
        }

        if (computerChoice === 'Ball') {
            resultMsg = 'User won';
        } else if (computerChoice === 'Bat') {
            resultMsg = 'It is a tie';
        } else if (computerChoice === 'Stump') {
            resultMsg = 'Computer won';
        }

        alert(`You have chosen Bat. Computer choice is ${computerChoice} and ${resultMsg}`);
    ">Bat</button>

    <button onclick="
        randomNumber = Math.random() * 3;
        computerChoice;
        resultMsg;

        if (randomNumber > 0 && randomNumber <= 1) {
            computerChoice = 'Bat';
        } else if (randomNumber > 1 && randomNumber <= 2) {
            computerChoice = 'Ball';
        } else {
            computerChoice = 'Stump';
        }

        if (computerChoice === 'Ball') {
            resultMsg = 'It is a tie';
        } else if (computerChoice === 'Bat') {
            resultMsg = 'Computer won';
        } else if (computerChoice === 'Stump') {
            resultMsg = 'User won';
        }

        alert(`You have chosen Ball. Computer choice is ${computerChoice} and ${resultMsg}`);
    ">Ball</button>

    <button onclick="
        randomNumber = Math.random() * 3;
        computerChoice;
        resultMsg;
        
        if (randomNumber > 0 && randomNumber <= 1) {
            computerChoice = 'Bat';
        } else if (randomNumber > 1 && randomNumber <= 2) {
            computerChoice = 'Ball';
        } else {
            computerChoice = 'Stump';
        }

        if (computerChoice === 'Ball') {
            resultMsg = 'Computer won';
        } else if (computerChoice === 'Bat') {

        } else if (computerChoice === 'Stump') {
            resultMsg = 'It is a tie';
        }

        alert(`You have chosen Stump. Computer choice is ${computerChoice} and ${resultMsg}`);
    ">Stump</button>
    

    
</body>
</html>

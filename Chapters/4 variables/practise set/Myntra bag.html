<!DOCTYPE html>
<html lang="en">
<head>
    <title>myntra bag</title>
    <link rel="stylesheet" href="myntra bag.css">
</head>
<body>
    <button class="bag-button" onclick="
        cartQuantity = cartQuantity + 1;
        document.querySelector('#cart-summary').innerText =
            `your bag has ${cartQuantity} items`;
    ">Add to Bag</button>

    <button class="wish-button" onclick="
    cartQuantity = cartQuantity - 1;
        document.querySelector('#cart-summary').innerText =
            `your bag has ${cartQuantity} items`;">
        Move to Wishlist
    </button>

    <button class="bag-button" onclick="
    cartQuantity = cartQuantity + 2;
        document.querySelector('#cart-summary').innerText =
            `your bag has ${cartQuantity} items`;">
        Add 1+1 sale Item
    </button>

    <h1 id="cart-summary"></h1>

    <script>
        let cartQuantity = 0;
        document.querySelector('#cart-summary').innerText =
            `your bag has ${cartQuantity} items`;
    </script>
</body>
</html>

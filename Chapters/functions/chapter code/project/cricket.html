<!DOCTYPE html>
<html lang="en">
<head>
    <title>Cricket Game</title>
    <style>
        body{
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Ball Bat Stump Game</h1>
    
        <button onclick="
        let computerChoice = generatecomputerchoice();

        let resultMsg = getResult('Bat', computerChoice);

        

        alert(`You have chosen Bat. Computer choice is ${computerChoice} and ${resultMsg}`);
    ">Bat</button>

    <button onclick="
        computerChoice = generatecomputerchoice();
        
        resultMsg = getResult('Ball', computerChoice);
        

        alert(`You have chosen Ball. Computer choice is ${computerChoice} and ${resultMsg}`);
        ">Ball</button>

    <button onclick="
       computerChoice = generatecomputerchoice();
       

        resultMsg = getResult('Stump', computerChoice);

        alert(`You have chosen Stump. Computer choice is ${computerChoice} and ${resultMsg}`);
        ">Stump</button>
    

     <script>
    //let computerChoice;

    function generatecomputerchoice(){

        let randomNumber = Math.random() * 3;
        
        if (randomNumber > 0 && randomNumber <= 1) {
            return 'Bat';
        } else if (randomNumber > 1 && randomNumber <= 2) {
            return 'Ball';
        } else {
            return 'Stump';
        } 


    }

    function getResult(usermove, computermove){
        if(usermove === 'Bat'){
            if (computermove === 'Ball') {
            return 'User won';
        } else if (computermove === 'Bat') {
            return 'It is a tie';
        } else if (computermove === 'Stump') {
            return 'Computer won';
        }
        }

        else if(usermove === 'Ball'){
             if (computermove === 'Ball') {
            return 'It is a tie';
        } else if (computermove === 'Bat') {
            return 'Computer won';
        } else if (computermove === 'Stump') {
            return 'User won';
        }
        }

        else{
            if (computermove === 'Ball') {
            return 'Computer won';
        } else if (computermove === 'Bat') {
            return 'User won';
        } else if (computermove === 'Stump') {
            return 'It is a tie';
        }
        }
    }
 </script>
    
</body>

</html>
